name: 03 - Workflow Runners
on: workflow_dispatch

jobs:
    ubuntu-echo:
        runs-on: ubuntu-latest
        steps:
            - name: Show OS
              shell: bash
              run: |
                echo "I'm running on bash"
                echo "${RUNNER_OS}"
    windows-echo:
        runs-on: windows-latest
        steps:
            - name: Show OS
              shell: bash
              run: |
                echo "This job is runnign on a windows runner."
                echo "${RUNNER_OS}"
